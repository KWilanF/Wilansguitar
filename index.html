/* Spinner design */
.spinner {

  border-radius: 50%;

  font-weight: bold;

}

/* Spinner animation */
@keyframes spin {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}

}

<body>

<header>
  <a href="#home" class="logo">WilaN<br>GuitaR</a>
  
  <div class="bx bx-menu" id="menu-icon"></div>

  <ul class="navbar">
    <li><a onclick="redirectWithLoading('songs.html')">songs</a></li>
    <li><a onclick="redirectWithLoading('echord.html')">chords</a></li>
    <li><a href="#about">about</a></li>
    <li><a href="#favorite">favorite</a></li>
    <li><a href="#exit">exit</a></li>
    <li>
      <a id="loginButton" onclick="handleProfileClick()" style="cursor: pointer;">
        <i class="bx bxs-user-circle"></i>
      </a>
    </li>
  </ul>
</header>

<!-- Login Form -->
<div id="loginForm" class="hidden">
  <form onsubmit="handleLogin(event)">
    <input type="text" id="username" placeholder="Username" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit">Login</button>
    <button type="button" onclick="closeLoginForm()">Close</button>
  </form>
</div>

<!-- Loading screen -->
<div id="loading-screen">
  <div class="loading-container">
    <div class="spinner"></div>
    <p>Loading... Please wait</p>
  </div>
</div>

<section class="home" id="home">
  <div class="home-text">
    <span>Welcome To</span>
    <h1>Wilan Guitar <br> Lyrics & Chords</h1>
    <h2>Feel free to Play <br> your favorite songs</h2>
    <button class="btn" onclick="redirectWithLoading('songs.html')">Play Now</button>
  </div>
  <div class="home-img">
    <img src="bg.png" alt="">
  </div>
</section>

<section class="footer" id="footer">
  <div class="social">
    <a href=""><i class="bx bxl-facebook"></i></a>
    <a href=""><i class="bx bxl-twitter"></i></a>
    <a href=""><i class="bx bxl-instagram"></i></a>
    <a href=""><i class="bx bxl-youtube"></i></a>
  </div>
  <div class="info">
    <h6>©All Rights Reserved • KentWilanFegarido @2024</h6>
  </div>
</section>

<script>
// Initialize click count
let clickCount = 0;  // Track the number of clicks
let clickTimeout;  // Store the timeout for resetting the count

// Function that runs when the profile icon is clicked
function handleProfileClick() {
  clickCount++;  // Increase the click count by 1

  // If clicked 5 times, show the login form
  if (clickCount === 5) {
    showLoginForm();  // Show the login form
    clickCount = 0;   // Reset the click count
  } else {
    
  }

  // Reset the click count after 1 second of inactivity
  clearTimeout(clickTimeout);  // Clear any existing timeout
  clickTimeout = setTimeout(() => {
    clickCount = 0;  // Reset the count if no click occurs within 1 second

  }, 300);  // Reset after 1 second
}

// Show login form
function showLoginForm() {
  const loginForm = document.getElementById("loginForm");
  loginForm.classList.remove("hidden");
}

// Close login form
function closeLoginForm() {
  const loginForm = document.getElementById("loginForm");
  loginForm.classList.add("hidden");
}

// Handle login form submission
function handleLogin(event) {
  event.preventDefault(); // Prevent form submission

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  // Example validation logic
  if (username === "admin" && password === "1234") {

    closeLoginForm();
    window.location.href = "admin.html"; // Redirect to admin page
  } else {
    alert("Invalid username or password.");
  }
}

// Handle outside click to close form
document.addEventListener('click', function(event) {
  const loginForm = document.getElementById("loginForm");
  const loginButton = document.getElementById("loginButton");

  if (!loginForm.contains(event.target) && !loginButton.contains(event.target)) {
    closeLoginForm();
  }
});

// Redirect with loading screen
function redirectWithLoading(url) {
  const loadingScreen = document.getElementById('loading-screen');
  loadingScreen.style.display = 'flex';  // Show loading screen

  setTimeout(() => {
    window.location.href = url;  // Redirect after 2 seconds
  }, 100);
}

let menu = document.querySelector('#menu-icon');
let navbar = document.querySelector('.navbar');

menu.onclick = () => {
  menu.classList.toggle('bx-x');
  navbar.classList.toggle('active');
};

window.onscroll = () => {
  menu.classList.remove('bx-x');
  navbar.classList.remove('active');
};

// Hide navbar when clicking anywhere outside
document.addEventListener('click', (event) => {
  if (!menu.contains(event.target) && !navbar.contains(event.target)) {
    menu.classList.remove('bx-x');
    navbar.classList.remove('active');
  }
});
</script>
