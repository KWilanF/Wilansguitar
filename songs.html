<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Song List</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css"/>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    :root {
      --main-color: #216C27;
      --second-color: #1C211C;
      --white: #ffffff;
      --gray: #f9f9f9;
      --hover-color: #1a4f1e;
    }

    /* Header */
    header {
      position: fixed;
      width: 100%;
      height: 60px;
      top: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #ffffff;
      box-shadow: 0 4px 40px rgb(14 55 54 / 14%);
      padding: 15px 10%;
      transition: 0.2s;
    }

    .logo {
      display: flex;
      align-items: center;
      font-size: 11px;
      color: var(--main-color);
      text-shadow: 1px 1px #B5B5B5;
      background-color: transparent;
      box-shadow: 0 2px 4px #000000;
      border-radius: 40px;
      width: 40px;
      height: 40px;
      font-weight: 600;
      padding: 5px;
      text-align: center;
      cursor: pointer;
    }

    #menu-icon {
      font-size: 30px;
      cursor: pointer;
      display: none;
      color: var(--second-color);
    }

    .navbar {
      display: flex;
      gap: 20px;
    }

    .navbar a {
      font-size: 1rem;
      padding: 11px 20px;
      color: var(--second-color);
      font-weight: 600;
      text-transform: uppercase;
      text-decoration: none;
    }

    .navbar a:hover {
      color: var(--main-color);
    }

    /* Mobile menu */
    @media (max-width: 768px) {
      #menu-icon {
        display: block;
      }

      .navbar {
        position: absolute;
        top: 60px;
        left: 0;
        width: 100%;
        background: #ffffff;
        flex-direction: column;
        display: none;
        box-shadow: 0 4px 4px rgba(0, 0, 0, 0.2);
        z-index: 999;
      }

      .navbar.active {
        display: flex;
      }

      .navbar a {
        padding: 15px;
        border-top: 1px solid #ddd;
      }
    }

    /* Search Bar */
    .search {
      position: fixed;
      top: 60px;
      left: 0;
      width: 100%;
      background: #fff;
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 10px;
      z-index: 999;
    }

    .search-bar {
      width: 60%;
      padding: 10px;
      font-size: 1rem;
      border: 2px solid var(--main-color);
      border-radius: 5px;
      outline: none;
    }

    .search-btn {
      padding: 10px 15px;
      font-size: 1rem;
      background-color: var(--main-color);
      color: var(--white);
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .search-btn:hover {
      background-color: var(--hover-color);
    }

    /* Song List */
    #song-results {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      margin-top: 160px;
    }

    .song-box {
      width: 300px;
      background: var(--main-color);
      border: 2px solid #000;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      color: #fff;
      transition: 0.3s;
      cursor: pointer;
    }

    .song-box:hover {
      background: var(--white);
      color: var(--main-color);
    }

    /* Song Form */
    #song-form {
      display: none;
      position: fixed;
      top: 50px;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .form-content {
      background: var(--white);
      width: 90%;
      max-width: 600px;
      max-height: 100%;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      overflow-y: auto;
      transform: translateY(-50px);
      transition: transform 0.3s ease;
    }

    .form-content h1 {
      background: #92D8A4;
      border-radius: 10px;
      padding: 5px;
      width: 200px;
      margin: 10px auto 10px;
      font-size: 1.5rem;
      color: var(--main-color);
    }

    .form-content h2 {
      font-size: 1rem;
      color: var(--main-color);
      margin-bottom: 10px;
    }

    .form-content h3 {
      font-size: 1rem;
      margin-top: 30px;
      color: var(--second-color);
    }

    .form-content p {
      text-align: left;
      font-size: 1rem;
    }

    .chord {
      background: #CCE8D4;
      color: green;
      font-weight: bold;
    }

    #close-btn {
      background: var(--main-color);
      color: var(--white);
      width: 30px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 20px;
      float: right;
    }

    #close-btn:hover {
      background: var(--hover-color);
    }

    /* Loading screen */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid transparent;
      border-top-color: #00ffcc;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-container p {
      font-size: 18px;
      color: white;
    }
  </style>
</head>
<body>

  <header>
    <a onclick="redirectWithLoading('index.html')" class="logo">WilaN<br>GuitaR</a>
    <div class="bx bx-menu" id="menu-icon"></div>

    <nav class="navbar" id="navbar">
      <a onclick="redirectWithLoading('index.html')">Home</a>
      <a onclick="redirectWithLoading('echord.html')">Chords</a>
      <a href="#favorite">Favorite</a>
    </nav>

    <div id="loading-screen">
      <div class="loading-container">
        <div class="spinner"></div>
        <p>Loading... Please wait</p>
      </div>
    </div>
  </header>

  <!-- Search -->
  <section class="search">
    <input type="text" id="search-bar" class="search-bar" placeholder="Search for songs..." oninput="showSuggestions(this.value)">
    <button class="search-btn" onclick="searchSongs()">Search</button>
  </section>

  <!-- Song Results -->
  <section id="song-results"></section>

  <!-- Song Form -->
  <div id="song-form">
    <div class="form-content">
      <button id="close-btn" onclick="closeForm()">x</button>
      <h1 id="song-title"></h1>
      <h2 id="song-artist"></h2>
      <div id="song-lyrics1"></div>
      <div id="song-lyrics2"></div>
    </div>
  </div>

  <script>
    const menu = document.getElementById("menu-icon");
    const navbar = document.getElementById("navbar");

    menu.addEventListener("click", () => {
      navbar.classList.toggle("active");
      menu.classList.toggle("bx-x");
    });

    document.addEventListener("click", (e) => {
      if (!navbar.contains(e.target) && !menu.contains(e.target)) {
        navbar.classList.remove("active");
        menu.classList.remove("bx-x");
      }
    });

    function redirectWithLoading(url) {
      document.getElementById("loading-screen").style.display = "flex";
      setTimeout(() => {
        window.location.href = url;
      }, 150);
    }

    let songData = [];

    async function fetchSongsFromBackend() {
      try {
        const response = await fetch("http://127.0.0.1:8000/api/songs/
");
        const data = await response.json();
        songData = data;
        showSuggestions("");
      } catch (err) {
        console.error("Fetch failed:", err);
      }
    }

    function showSuggestions(query) {
      const results = document.getElementById("song-results");
      const filtered = !query.trim()
        ? songData
        : songData.filter(song => song.title.toLowerCase().includes(query.toLowerCase()));

      results.innerHTML = filtered
        .map(song => `
          <div class="song-box" onclick="selectSong('${song.title}')">
            <h3>${song.title}</h3>
            <p>by ${song.artist}</p>
          </div>
        `)
        .join("");
    }

    function selectSong(title) {
      document.getElementById("search-bar").value = title;
      showSongForm(title);
    }

    function showSongForm(title) {
      const song = songData.find(s => s.title === title);
      if (!song) return alert("Song not found!");

      document.getElementById("song-title").innerText = song.title;
      document.getElementById("song-artist").innerText = "by " + song.artist;

      const highlightChords = line =>
        line.replace(/\b([A-G](#|b)?(maj|min|dim|aug|add|sus|m|M)?\d*)\b/g, '<span class="chord">$1</span>');

      const lyrics1 = document.getElementById("song-lyrics1");
      const lyrics2 = document.getElementById("song-lyrics2");
      lyrics1.innerHTML = lyrics2.innerHTML = "";

      if (Array.isArray(song.lyrics)) {
        const half = Math.ceil(song.lyrics.length / 2);
        lyrics1.innerHTML = song.lyrics.slice(0, half).map(l =>
          `<p><strong>${highlightChords(l.chords || "")}</strong></p><p>${highlightChords(l.line || "")}</p>`
        ).join("");
        lyrics2.innerHTML = song.lyrics.slice(half).map(l =>
          `<p><strong>${highlightChords(l.chords || "")}</strong></p><p>${highlightChords(l.line || "")}</p>`
        ).join("");
      } else if (typeof song.lyrics === "string") {
        const lines = song.lyrics.split("\n");
        const half = Math.ceil(lines.length / 2);
        lyrics1.innerHTML = lines.slice(0, half).map(line => `<p>${highlightChords(line)}</p>`).join("");
        lyrics2.innerHTML = lines.slice(half).map(line => `<p>${highlightChords(line)}</p>`).join("");
      }

      document.getElementById("song-form").style.display = "flex";
    }

    function closeForm() {
      document.getElementById("song-form").style.display = "none";
    }

    function searchSongs() {
      const query = document.getElementById("search-bar").value;
      showSuggestions(query);
    }

    window.onload = fetchSongsFromBackend;
  </script>
</body>
</html>
